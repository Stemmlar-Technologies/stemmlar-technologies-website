    <title>Stemmlar Technologies</title>
    <script>
      // GitHub Pages SPA redirect — restores path from query string set by 404.html
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Also handle ?p= style redirect from 404.html
        var search = window.location.search;
        if (search.slice(1,3) === 'p=') {
          var decoded = search.slice(3).replace(/~and~/g, '&');
          history.replaceState(null, null, decoded || '/');
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
