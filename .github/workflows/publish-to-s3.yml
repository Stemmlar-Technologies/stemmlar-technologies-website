name: Publish to S3

on:
    push:
        branches: ['main', 'master']

permissions:
    id-token: write   # required for OIDC token request
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: production
        env:
            AWS_BUCKET: ${{ vars.AWS_BUCKET }}
            AWS_DISTRIBUTION_ID: ${{ vars.AWS_DISTRIBUTION_ID }}
            AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
            BUILD_DIR: ./dist
            CI: ''
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 24.15.0

            - run: npm install
            - run: npm run build

            - name: Configure AWS credentials via OIDC
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ env.AWS_ROLE_ARN }}
                  aws-region: eu-west-1

            - name: Clear S3 Bucket
              run: |
                  aws s3 rm s3://${{ env.AWS_BUCKET }} --recursive

            - name: Upload files to S3 bucket
              run: |
                  aws s3 cp ${{ env.BUILD_DIR }} s3://${{ env.AWS_BUCKET }} --recursive

            - name: Invalidate CloudFront Cache
              run: |
                  aws cloudfront create-invalidation --distribution-id ${{ env.AWS_DISTRIBUTION_ID }} --paths /*
